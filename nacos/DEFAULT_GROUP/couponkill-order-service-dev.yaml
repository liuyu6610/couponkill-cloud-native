server:
  port: 8082

spring:
  application:
    name: couponkill-order-service
  cloud:
    nacos:
      server-addr: nacos:8848
      namespace: couponkill
    # 添加负载均衡配置
    loadbalancer:
      retry:
        enabled: true
        max-retries-on-next-service-instance: 1
  datasource:
    # 注意：业务真实连接池由 ShardingSphere YAML 的 Hikari maximumPoolSize 决定（order/coupon=300）。
    # 此处仅作兜底/误导性默认，已从 100 上调，避免「卡在百级」的假天花板认知。
    hikari:
      maximum-pool-size: 200
      minimum-idle: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

# Feign配置
feign:
  client:
    config:
      coupon-service:
        connectTimeout: 1000
        readTimeout: 5000
      default:
        connectTimeout: 1000
        readTimeout: 5000
  compression:
    request:
      enabled: true
      min-request-size: 2048
    response:
      enabled: true
  httpclient:
    enabled: true
    max-connections: 3000
    max-connections-per-route: 1500
    connection-timeout: 2000
    connection-timer-repeat: 3000

# 负载均衡配置
ribbon:
  ConnectTimeout: 2000
  ReadTimeout: 5000
  MaxAutoRetries: 0
  MaxAutoRetriesNextServer: 1

# Kafka 主题与消费者组配置（bootstrap-servers 由 common.yaml 统一提供）
kafka:
  consumer:
    group:
      seckill-result: seckill-order-result-group
  topic:
    seckill-order-result: seckill_order_result
    seckill-order-create: seckill_order_create
    seckill-compensation: seckill_compensation

# 秒杀相关配置
couponkill:
  seckill:
    cooldown-seconds: 0
    deduct-ttl-seconds: 300
    compensation-amount: 10.0
    # 热路径 Kafka send.get 有界超时（毫秒）；超时走 Redis 补偿
    kafka-send-timeout-ms: 500
    # 消费侧 listener 并发（配合虚拟线程执行器）
    listener-concurrency: 8
    result-listener-concurrency: 4
    # JDK25 Structured Concurrency（preview，需 --enable-preview）；默认关
    structured-concurrency: false
    # Go 引擎已对齐分片/键名/多 DS 后可按需开启
    go:
      enabled: false
      url: http://seckill-go-svc:8083
    java:
      qps-threshold: 500
    fallback-to-go: false

# 订单服务集群配置
order:
  cluster:
    # 是否启用集群模式
    enabled: false
    # 集群节点列表
    nodes:
      - couponkill-order-service-0.couponkill-order-service-headless:8082
      - couponkill-order-service-1.couponkill-order-service-headless:8082
      - couponkill-order-service-2.couponkill-order-service-headless:8082
    # 分布式锁配置
    lock:
      timeout: 5000
      retries: 3