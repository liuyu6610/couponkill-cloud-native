# 数据库连接配置
# 警告：本文件为历史抽象配置，业务真实连接池以 ShardingSphere YAML 为准。
# MySQLConfig 等代码路径未必消费此处；调并发请改 nacos/shard/*/ *-service-sharding.yaml。
database:
  connection:
    # 连接池配置（误导性「100」已上调，避免与压测结论混淆）
    pool:
      max-active: 200
      max-idle: 40
      min-idle: 10
      initial-size: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      remove-abandoned: true
      remove-abandoned-timeout: 1800
      log-abandoned: true
      
    # 事务配置
    transaction:
      isolation-level: READ_COMMITTED
      timeout: 30
      rollback-on-commit-failure: true
      
    # SQL配置
    sql:
      show-sql: false
      format-sql: false
      use-sql-comments: false
      
    # 连接配置
    connection:
      auto-commit: true
      catalog: 
      schema: public
      network-timeout: 30000
      holdability: HOLD_CURSORS_OVER_COMMIT
      
    # 驱动配置
    driver:
      class-name: org.postgresql.Driver
      url-params: "reWriteBatchedInserts=true&ApplicationName=couponkill&sslmode=disable"
      
    # SSL配置
    ssl:
      enabled: false
      keystore:
      keystore-password:
      truststore:
      truststore-password:
      
    # 故障转移配置
    failover:
      enabled: true
      retry-count: 3
      retry-interval: 1000
      timeout: 5000
      
    # 监控配置
    monitoring:
      enabled: true
      slow-sql-threshold: 1000
      log-slow-sql: true
      log-all-sql: false