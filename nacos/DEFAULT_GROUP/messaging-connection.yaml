# 消息队列连接配置（Kafka）
messaging:
  connection:
    kafka:
      # 通用连接
      bootstrap-servers: kafka:9092
      client-id: couponkill

      # 生产者配置
      producer:
        acks: all
        retries: 3
        enable-idempotence: true
        batch-size: 32768
        linger-ms: 5
        buffer-memory: 33554432
        compression-type: lz4
        request-timeout-ms: 3000
        delivery-timeout-ms: 10000
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
        max-message-size: 1048576

      # 消费者配置
      consumer:
        group-id: default-consumer-group
        auto-offset-reset: latest
        enable-auto-commit: true
        max-poll-records: 500
        fetch-min-bytes: 1
        session-timeout-ms: 15000
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
        properties:
          spring.json.trusted.packages: com.aliyun.seckill.common.pojo

      # 主题配置
      topic:
        seckill-order-create: seckill_order_create
        seckill-order-result: seckill_order_result
        seckill-compensation: seckill_compensation
        # 死信主题命名约定
        dlq-suffix: .DLT

      # 故障转移配置
      failover:
        enabled: true
        retry-count: 3
        retry-interval: 1000
        timeout: 5000

      # 监控配置
      monitoring:
        enabled: true
        slow-operation-threshold: 1000
        log-slow-operations: true
