# 中间件集群配置
middleware:
  # 集群全局配置
  cluster:
    enabled: false
    mode: auto  # auto, manual
    
  # 数据库集群配置
  database:
    postgresql:
      # 集群类型: standalone, master-slave, patroni-cluster
      type: standalone
      standalone:
        host: postgres
        port: 5432
        username: postgres
        password: postgres
      master-slave:
        master:
          host: postgres-master
          port: 5432
          username: postgres
          password: postgres
        slaves:
          - host: postgres-slave-0
            port: 5432
            username: postgres
            password: postgres
          - host: postgres-slave-1
            port: 5432
            username: postgres
            password: postgres
      # Patroni/流复制高可用集群
      patroni-cluster:
        nodes:
          - host: postgres-node-0
            port: 5432
            username: postgres
            password: postgres
          - host: postgres-node-1
            port: 5432
            username: postgres
            password: postgres
          - host: postgres-node-2
            port: 5432
            username: postgres
            password: postgres
            
  # 缓存集群配置
  cache:
    redis:
      # 集群类型: standalone, master-slave, sentinel, cluster
      type: standalone
      standalone:
        host: redis-master
        port: 6379
        password: ""
        database: 0
      master-slave:
        master:
          host: redis-master
          port: 6379
          password: ""
        slaves:
          - host: redis-slave-0
            port: 6379
            password: ""
          - host: redis-slave-1
            port: 6379
            password: ""
      sentinel:
        master-name: mymaster
        sentinels:
          - host: redis-sentinel-0
            port: 26379
          - host: redis-sentinel-1
            port: 26379
          - host: redis-sentinel-2
            port: 26379
        password: ""
        database: 0
      cluster:
        nodes:
          - host: redis-node-0
            port: 6379
          - host: redis-node-1
            port: 6379
          - host: redis-node-2
            port: 6379
          - host: redis-node-3
            port: 6379
          - host: redis-node-4
            port: 6379
          - host: redis-node-5
            port: 6379
        password: ""
        max-redirects: 3
        
  # 消息队列集群配置
  messaging:
    kafka:
      # 集群类型: standalone, cluster
      type: standalone
      standalone:
        bootstrap-servers: kafka:9092
      cluster:
        bootstrap-servers:
          - kafka-0:9092
          - kafka-1:9092
          - kafka-2:9092
              
  # 配置中心集群配置
  config:
    nacos:
      # 集群类型: standalone, cluster
      type: standalone
      standalone:
        server-addr: nacos:8848
      cluster:
        server-addrs:
          - nacos-0:8848
          - nacos-1:8848
          - nacos-2:8848
        namespace: couponkill
          
  # 服务注册发现集群配置
  registry:
    nacos:
      # 集群类型: standalone, cluster
      type: standalone
      standalone:
        server-addr: nacos:8848
      cluster:
        server-addrs:
          - nacos-0:8848
          - nacos-1:8848
          - nacos-2:8848
        namespace: couponkill
        
  # 负载均衡配置
  loadbalancer:
    strategy: ROUND_ROBIN  # ROUND_ROBIN, RANDOM, WEIGHT
    retry:
      enabled: true
      max-attempts: 3
      backoff:
        enabled: true
        multiplier: 2.0
        max-interval: 10000
        
  # 故障转移配置
  failover:
    enabled: true
    timeout: 5000
    retry-count: 3
    retry-interval: 1000