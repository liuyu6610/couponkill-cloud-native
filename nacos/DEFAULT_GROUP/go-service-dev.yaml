server:
  port: 8083

spring:
  application:
    name: seckill-go-service
  cloud:
    nacos:
      server-addr: nacos:8848
      namespace: couponkill

seckill:
  max-concurrency: 5000
  redis-key-prefix: "seckill:"
  valid-days: 7
  redis:
    stock-key-prefix: "coupon:stock:"

# 注：key 名 mysql 为历史遗留；值为 PostgreSQL DSN（lib/pq）。
# 多数据源名称必须与 sharding_rule.go / Java ShardingSphere 一致。
mysql:
  dataSources:
    order-db-0:
      dsn: "host=postgres port=5432 user=postgres password=postgres dbname=order_db_0 sslmode=disable"
    order-db-1:
      dsn: "host=postgres port=5432 user=postgres password=postgres dbname=order_db_1 sslmode=disable"
    coupon-db-0:
      dsn: "host=postgres port=5432 user=postgres password=postgres dbname=coupon_db_0 sslmode=disable"
    coupon-db-1:
      dsn: "host=postgres port=5432 user=postgres password=postgres dbname=coupon_db_1 sslmode=disable"
    user-db-0:
      dsn: "host=postgres port=5432 user=postgres password=postgres dbname=user_db_0 sslmode=disable"
    user-db-1:
      dsn: "host=postgres port=5432 user=postgres password=postgres dbname=user_db_1 sslmode=disable"

data.redis:
  host: "redis-master:6379"
  db: 0

nacos:
  server-addr: "nacos:8848"
  namespace-id: "couponkill"

# Go服务集群配置
go:
  cluster:
    enabled: false
    nodes:
      - seckill-go-0.seckill-go-headless:8083
      - seckill-go-1.seckill-go-headless:8083
      - seckill-go-2.seckill-go-headless:8083
    load-balancer:
      strategy: LEAST_CONNECTION
    task:
      distribution:
        strategy: HASH
