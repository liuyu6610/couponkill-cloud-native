# 单节点模式数据源配置
dataSources:
  user-db-0:
    driverClassName: org.postgresql.Driver
    jdbcUrl: jdbc:postgresql://postgres:5432/user_db_0?reWriteBatchedInserts=true&ApplicationName=couponkill-user
    username: postgres
    password: postgres
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    connectionTimeout: 2000
    idleTimeout: 600000
    maxLifetime: 1800000
    maximumPoolSize: 10
    minimumIdle: 2
    leakDetectionThreshold: 60000
  user-db-1:
    driverClassName: org.postgresql.Driver
    jdbcUrl: jdbc:postgresql://postgres:5432/user_db_1?reWriteBatchedInserts=true&ApplicationName=couponkill-user
    username: postgres
    password: postgres
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    connectionTimeout: 2000
    idleTimeout: 600000
    maxLifetime: 1800000
    maximumPoolSize: 10
    minimumIdle: 2
    leakDetectionThreshold: 60000


