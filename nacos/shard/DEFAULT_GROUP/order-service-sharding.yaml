# 单节点模式数据源配置
dataSources:
  order-db-0:
    driverClassName: org.postgresql.Driver
    jdbcUrl: jdbc:postgresql://postgres:5432/order_db_0?reWriteBatchedInserts=true&ApplicationName=couponkill-order
    username: postgres
    password: postgres
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    connectionTimeout: 2000
    idleTimeout: 600000
    maxLifetime: 1800000
    maximumPoolSize: 32
    minimumIdle: 4
    leakDetectionThreshold: 60000
  order-db-1:
    driverClassName: org.postgresql.Driver
    jdbcUrl: jdbc:postgresql://postgres:5432/order_db_1?reWriteBatchedInserts=true&ApplicationName=couponkill-order
    username: postgres
    password: postgres
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    connectionTimeout: 2000
    idleTimeout: 600000
    maxLifetime: 1800000
    maximumPoolSize: 32
    minimumIdle: 4
    leakDetectionThreshold: 60000


