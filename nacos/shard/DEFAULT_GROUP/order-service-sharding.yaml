rules:
- !SINGLE
  tables:
    - order-db-0.seckill_reservation
- !SHARDING
  tables:
    order:
      actualDataNodes: order-db-$->{0..1}.order_$->{0..15}
      databaseStrategy:
        standard:
          shardingColumn: user_id
          shardingAlgorithmName: order-db-inline
      tableStrategy:
        standard:
          shardingColumn: user_id
          shardingAlgorithmName: order-table-inline
  shardingAlgorithms:
    order-db-inline:
      type: INLINE
      props:
        algorithm-expression: order-db-$->{user_id % 2}
    order-table-inline:
      type: INLINE
      props:
        algorithm-expression: order_$->{user_id % 16}
  keyGenerators:
    snowflake:
      type: SNOWFLAKE
      props:
        worker-id: 1
        data-center-id: 1

props:
  sql-show: false
  query-with-cipher-column: false
  sql-comment-parse-enabled: true
  max-connections-size-per-query: 16
  check-table-metadata-enabled: false