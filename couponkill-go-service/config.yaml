server:
  port: 8083

seckill:
  max-concurrency: 2000
  redis-key-prefix: "seckill:"
  valid-days: 7
  redis:
    stock-key-prefix: "coupon:stock:"

# 本地开发：多 PG 库对齐 Java 分片（docker-compose.migration.yml）
mysql:
  dataSources:
    order-db-0:
      dsn: "host=localhost port=5432 user=postgres password=postgres dbname=order_db_0 sslmode=disable"
    order-db-1:
      dsn: "host=localhost port=5432 user=postgres password=postgres dbname=order_db_1 sslmode=disable"
    coupon-db-0:
      dsn: "host=localhost port=5432 user=postgres password=postgres dbname=coupon_db_0 sslmode=disable"
    coupon-db-1:
      dsn: "host=localhost port=5432 user=postgres password=postgres dbname=coupon_db_1 sslmode=disable"
    user-db-0:
      dsn: "host=localhost port=5432 user=postgres password=postgres dbname=user_db_0 sslmode=disable"
    user-db-1:
      dsn: "host=localhost port=5432 user=postgres password=postgres dbname=user_db_1 sslmode=disable"

data.redis:
  host: "localhost:6379"
  username: ""
  password: ""
  db: 0

nacos:
  server-addr: "localhost:8848"
  namespace-id: "couponkill"
