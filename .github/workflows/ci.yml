# CI 真源说明见 docs/CICD-SOURCE-OF-TRUTH.md
# 本 workflow 仅做 PR/推送校验，不推镜像、不部署集群（CD 以根目录 Jenkinsfile 为准）。
name: CouponKill CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  java-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      # -am：解析本地 couponkill-common SNAPSHOT
      # 排除 *ApplicationTests：完整 Spring 上下文依赖 PG/Nacos/ShardingSphere，属本地/联调冒烟，不在 GHA 起中间件
      - name: Compile and run unit/contract tests
        run: >
          mvn -B
          -pl couponkill-coupon-service,couponkill-order-service,couponkill-user-service,couponkill-gateway
          -am test
          -Dtest='!*ApplicationTests'
          -Dsurefire.failIfNoSpecifiedTests=false

  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: couponkill-go-service/go.sum
      - name: Test Go seckill service
        working-directory: couponkill-go-service
        run: go test ./...
