# Istio ??????
# 金丝雀流量权重（未开金丝雀时 100% stable；开金丝雀见 values.canary-keda.yaml）
canary:
  coupon:
    weightStable: 100
    weightCanary: 0
  order:
    weightStable: 100
    weightCanary: 0
  go:
    weightStable: 100

istio:
  enabled: true
  gateway:
    name: couponkill-gateway
    host: "couponkill.example.com"
    port: 80
    tls: false

  destinationRule:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        maxRequestsPerConnection: 10
    outlierDetection:
      consecutiveErrors: 5
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 10
  virtualService:
    retries:
      attempts: 3
      perTryTimeout: 2s
      retryOn: "5xx,connect-failure,refused-stream"

# KEDA??????�?
keda:
  enabled: true
  scaledObject:
    pollingInterval: 30
    cooldownPeriod: 300
    minReplicaCount: 1
    maxReplicaCount: 10
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-server.monitoring.svc.cluster.local
        metricName: http_requests_total
        threshold: '100'
        query: sum(rate(http_requests_total{deployment="couponkill-gateway"}[2m]))

# ????
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
  prometheusRule:
    enabled: true

# ????
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: istio-system
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8082
        - protocol: TCP
          port: 8083
        - protocol: TCP
          port: 8084
        - protocol: TCP
          port: 8090
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9090

# ????
security:
  enabled: true
  podSecurityPolicy:
    enabled: true
  networkPolicy:
    enabled: true

# ????
logging:
