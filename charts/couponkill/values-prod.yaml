# Nacos??
nacos:
  enabled: true
  name: nacos
  image:
    repository: nacos/nacos-server
    tag: v3.1.1
    pullPolicy: IfNotPresent
  replicas: 3
  service:
    port: 8848
    # ??????
    external:
      enabled: true
      type: LoadBalancer
      port: 8848
  storage:
    # Nacos 元库：演示用 embedded；生产 PG 需社区插件，见 values.yaml 注释
    type: embedded
    postgresql:
      host: postgres
      port: 5432
      user: postgres
      password: postgres
      database: nacos
  config:
    # Nacos????
    common:
      dataId: common.yaml
      group: DEFAULT_GROUP
      content: |
        spring:
          data:
            redis:
              host: redis
              port: 6379
              lettuce:
                pool:
                  max-active: 50
                  max-idle: 20
                  min-idle: 5
                  max-wait: 2000ms
          cloud:
            sentinel:
              transport:
                dashboard: sentinel-dashboard:8080
                port: 8719
              eager: true
            nacos:
              discovery:
                server-addr: nacos:8848
          datasource:
            # 公共库连接示例；各服务以 sharding YAML 为准
            url: jdbc:postgresql://postgres:5432/postgres?reWriteBatchedInserts=true&sslmode=disable
            username: postgres
            password: postgres
            driver-class-name: org.postgresql.Driver
          kafka:
            bootstrap-servers: broker:9092
        kafka:
          topic:
            seckill-order-create: seckill_order_create
            seckill-order-result: seckill_order_result
            seckill-compensation: seckill_compensation
        thread-pool:
          async:
            core-pool-size: 16
            max-pool-size: 32
            queue-capacity: 200
            keep-alive-seconds: 60
            rejected-policy: CALLER_RUNS
          order:
            core-pool-size: 20
            max-pool-size: 40
            queue-capacity: 500
            thread-name-prefix: "order-async-"
            keep-alive-seconds: 60
            rejected-policy: CALLER_RUNS
    # ??????????�?
    sharding:
      user:
        dataId: user-service-sharding.yaml
        group: DEFAULT_GROUP
        content: |
          dataSources:
            user-db-0:
              driverClassName: org.postgresql.Driver
              jdbcUrl: jdbc:postgresql://postgres:5432/user_db_0?reWriteBatchedInserts=true&ApplicationName=couponkill
              username: postgres
              password: postgres
              dataSourceClassName: com.zaxxer.hikari.HikariDataSource
            user-db-1:
              driverClassName: org.postgresql.Driver
              jdbcUrl: jdbc:postgresql://postgres:5432/user_db_1?reWriteBatchedInserts=true&ApplicationName=couponkill
              username: postgres
              password: postgres
              dataSourceClassName: com.zaxxer.hikari.HikariDataSource
          rules:
          - !SHARDING
            tables:
              user:
                actualDataNodes: user-db-$->{0..1}.user
                databaseStrategy:
                  standard:
                    shardingColumn: id
                    shardingAlgorithmName: user-db-inline
              user_coupon_count:
                actualDataNodes: user-db-$->{0..1}.user_coupon_count
                databaseStrategy:
                  standard:
                    shardingColumn: user_id
                    shardingAlgorithmName: user-coupon-count-db-inline
            shardingAlgorithms:
              user-db-inline:
                type: INLINE
                props:
                  algorithm-expression: user-db-$->{id % 2}
              user-coupon-count-db-inline:
                type: INLINE
                props:
                  algorithm-expression: user-db-$->{user_id % 2}
            keyGenerators:
              snowflake:
                type: SNOWFLAKE
                props:
                  worker-id: 1
                  data-center-id: 1
          props:
            sql-show: true
            sql-trace: true
            query-with-cipher-column: false
            sql-comment-parse-enabled: true
      order:
        dataId: order-service-sharding.yaml
        group: DEFAULT_GROUP
        content: |
          dataSources:
            order-db-0:
              driverClassName: org.postgresql.Driver
              jdbcUrl: jdbc:postgresql://postgres:5432/order_db_0?reWriteBatchedInserts=true&ApplicationName=couponkill
              username: postgres
              password: postgres
              dataSourceClassName: com.zaxxer.hikari.HikariDataSource
            order-db-1:
              driverClassName: org.postgresql.Driver
              jdbcUrl: jdbc:postgresql://postgres:5432/order_db_1?reWriteBatchedInserts=true&ApplicationName=couponkill
              username: postgres
              password: postgres
              dataSourceClassName: com.zaxxer.hikari.HikariDataSource
            order-db-2:
              driverClassName: org.postgresql.Driver
              jdbcUrl: jdbc:postgresql://postgres:5432/order_db_2?reWriteBatchedInserts=true&ApplicationName=couponkill
              username: postgres
              password: postgres
              dataSourceClassName: com.zaxxer.hikari.HikariDataSource
            order-db-3:
              driverClassName: org.postgresql.Driver
              jdbcUrl: jdbc:postgresql://postgres:5432/order_db_3?reWriteBatchedInserts=true&ApplicationName=couponkill
              username: postgres
              password: postgres
              dataSourceClassName: com.zaxxer.hikari.HikariDataSource
          rules:
          - !SHARDING
            tables:
              order:
                actualDataNodes: order-db-$->{0..3}.order_$->{0..15}
                databaseStrategy:
                  standard:
                    shardingColumn: user_id
                    shardingAlgorithmName: order-db-inline
                tableStrategy:
                  standard:
                    shardingColumn: user_id
                    shardingAlgorithmName: order-table-inline
            shardingAlgorithms:
              order-db-inline:
                type: INLINE
                props:
                  algorithm-expression: order-db-$->{user_id % 4}
              order-table-inline:
                type: INLINE
                props:
                  algorithm-expression: order_$->{user_id % 16}
            keyGenerators:
              snowflake:
                type: SNOWFLAKE
                props:
                  worker-id: 1
                  data-center-id: 1
          props:
            sql-show: true
            query-with-cipher-column: false
            sql-comment-parse-enabled: true
      coupon:
        dataId: coupon-service-sharding.yaml
        group: DEFAULT_GROUP
        content: |
          dataSources:
            coupon-db-0:
              driverClassName: org.postgresql.Driver
              jdbcUrl: jdbc:postgresql://postgres:5432/coupon_db_0?reWriteBatchedInserts=true&ApplicationName=couponkill
              username: postgres
              password: postgres
              dataSourceClassName: com.zaxxer.hikari.HikariDataSource
            coupon-db-1:
              driverClassName: org.postgresql.Driver
              jdbcUrl: jdbc:postgresql://postgres:5432/coupon_db_1?reWriteBatchedInserts=true&ApplicationName=couponkill
              username: postgres
              password: postgres
              dataSourceClassName: com.zaxxer.hikari.HikariDataSource
            coupon-db-2:
              driverClassName: org.postgresql.Driver
              jdbcUrl: jdbc:postgresql://postgres:5432/coupon_db_2?reWriteBatchedInserts=true&ApplicationName=couponkill
              username: postgres
              password: postgres
              dataSourceClassName: com.zaxxer.hikari.HikariDataSource
            coupon-db-3:
              driverClassName: org.postgresql.Driver
              jdbcUrl: jdbc:postgresql://postgres:5432/coupon_db_3?reWriteBatchedInserts=true&ApplicationName=couponkill
              username: postgres
              password: postgres
              dataSourceClassName: com.zaxxer.hikari.HikariDataSource
          rules:
            - !SHARDING
              tables:
                coupon:
                  actualDataNodes: coupon-db-$->{0..3}.coupon_$->{0..15}
                  databaseStrategy:
                    standard:
                      shardingColumn: shard_index
                      shardingAlgorithmName: coupon-db-inline
                  tableStrategy:
                    standard:
                      shardingColumn: shard_index
                      shardingAlgorithmName: coupon-table-inline
                stock_log:
                  actualDataNodes: coupon-db-$->{0..3}.stock_log_$->{0..15}
                  databaseStrategy:
                    standard:
                      shardingColumn: shard_index
                      shardingAlgorithmName: coupon-db-inline
                  tableStrategy:
                    standard:
                      shardingColumn: shard_index
                      shardingAlgorithmName: stock-log-table-inline
              shardingAlgorithms:
                coupon-db-inline:
                  type: INLINE
                  props:
                    algorithm-expression: coupon-db-$->{(int)(shard_index / 16) % 4}
                coupon-table-inline:
                  type: INLINE
                  props:
                    algorithm-expression: coupon_$->{shard_index % 16}
                stock-log-table-inline:
                  type: INLINE
                  props:
                    algorithm-expression: stock_log_$->{shard_index % 16}
              keyGenerators:
                snowflake:
                  type: SNOWFLAKE
                  props:
                    worker-id: 1
                    data-center-id: 1
          props:
            sql-show: true
            query-with-cipher-column: false
            sql-comment-parse-enabled: true
    collaboration:
      dataId: service-collaboration.yaml
      group: DEFAULT_GROUP
      content: |
        collaboration:
          java-service-url: "http://couponkill-service:8080"
          go-service-url: "http://seckill-go-svc:8083"
          java-qps-threshold: 1000
          # Go 热路径冻结：禁止生产开启 / 过载切流
          go-enabled: false
          fallback-to-go: false
    middleware:
      dataId: middleware-cluster-config.yaml
      group: DEFAULT_GROUP
      content: |
        middleware:
          postgres:
            cluster:
              enabled: false
              nodes: []
            replication:
              enabled: false
              master:
                host: ""
                port: 5432
              slaves: []
          redis:
            cluster:
              enabled: false
              nodes: []
            sentinel:
              enabled: false
              masterName: "mymaster"
              nodes: []
              password: ""
          kafka:
            cluster:
              enabled: false
              brokers: []
    gateway:
      dataId: gateway-routes.yaml
      group: DEFAULT_GROUP
      content: |
        spring:
          cloud:
            gateway:
              server:
                webflux:
                  routes:
                    - id: user-service
                      uri: http://couponkill-service:8083
                      predicates:
                        - Path=/api/v1/user/**
                      filters:
                        - StripPrefix=3
                    - id: order-service
                      uri: http://couponkill-service:8082
                      predicates:
                        # Phase1 双挂；注意：Controller 自带完整前缀时不应 StripPrefix
                        - Path=/api/v1/order/**,/order/**
                    - id: coupon-service
                      uri: http://couponkill-service:8081
                      predicates:
                        - Path=/api/v1/coupon/**
                      filters:
                        - StripPrefix=3
                    # Go 热路径已冻结：默认不经网关暴露
                    # - id: go-service
                    #   uri: http://seckill-go-svc:8083
                    #   predicates:
                    #     - Path=/seckill/**

    go:
      dataId: go-service-dev.yaml
      group: DEFAULT_GROUP
      content: |
        server:
          port: 8083

        seckill:
          max-concurrency: 2000
          redis-key-prefix: "seckill:"
          valid-days: 7
          redis:
            stock-key-prefix: "coupon:stock:"

        # PostgreSQL DSN（对齐 nacos/go-service-dev.yaml postgres key）
        postgres:
          dataSources:
            order-db-0:
              dsn: "host=postgres port=5432 user=postgres password=postgres dbname=order_db_0 sslmode=disable"
            order-db-1:
              dsn: "host=postgres port=5432 user=postgres password=postgres dbname=order_db_1 sslmode=disable"
            coupon-db-0:
              dsn: "host=postgres port=5432 user=postgres password=postgres dbname=coupon_db_0 sslmode=disable"
            coupon-db-1:
              dsn: "host=postgres port=5432 user=postgres password=postgres dbname=coupon_db_1 sslmode=disable"
            user-db-0:
              dsn: "host=postgres port=5432 user=postgres password=postgres dbname=user_db_0 sslmode=disable"
            user-db-1:
              dsn: "host=postgres port=5432 user=postgres password=postgres dbname=user_db_1 sslmode=disable"

        data.redis:
          host: "redis-master:6379"
          db: 0

        nacos:
          server-addr: "nacos:8848"
          namespace-id: "couponkill"

