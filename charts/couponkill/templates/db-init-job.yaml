{{- if and .Values.db.init.enabled .Values.dependencies.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.db.init.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.db.init.name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    metadata:
      labels:
        app: {{ .Values.db.init.name }}
    spec:
      containers:
        - name: postgres-client
          image: "{{ .Values.db.init.image.repository }}:{{ .Values.db.init.image.tag }}"
          imagePullPolicy: {{ .Values.db.init.image.pullPolicy }}
          env:
            - name: PGHOST
              value: "{{ .Values.db.host }}"
            - name: PGPORT
              value: "{{ .Values.db.port }}"
            - name: PGUSER
              value: "{{ .Values.db.username }}"
            - name: PGPASSWORD
              value: "{{ .Values.db.password }}"
            - name: PGDATABASE
              value: "{{ .Values.db.database }}"
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER"; do
                sleep 2
              done
              echo "Applying init-postgres.sql (databases + sharded tables)..."
              psql -v ON_ERROR_STOP=1 -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -f /scripts/init-postgres.sql
              echo "PostgreSQL schema initialized successfully."
          volumeMounts:
            - name: init-sql
              mountPath: /scripts
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: init-sql
          configMap:
            name: {{ .Values.db.init.name }}-sql
      restartPolicy: OnFailure
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.db.init.name }}-sql
  namespace: {{ .Values.namespace }}
data:
  init-postgres.sql: |
{{ .Files.Get "scripts/init-postgres.sql" | indent 4 }}
{{- end }}
