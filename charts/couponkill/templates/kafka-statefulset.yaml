{{- if and .Values.kafka.enabled (.Values.kafka.statefulSet.enabled | default false) }}
{{- $name := .Values.kafka.name | default "kafka" }}
{{- $ns := .Values.namespace }}
{{- $replicas := int (.Values.kafka.statefulSet.replicas | default 1) }}
---
# Kafka Headless Service（StatefulSet DNS）
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-headless
  namespace: {{ $ns }}
  labels:
    app: {{ $name }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: {{ $name }}
  ports:
    - name: plaintext
      port: {{ .Values.kafka.port | default 9092 }}
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
---
# Kafka ClusterIP（应用 bootstrap：{{ $name }}:9092）
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    app: {{ $name }}
spec:
  type: ClusterIP
  selector:
    app: {{ $name }}
  ports:
    - name: plaintext
      port: {{ .Values.kafka.port | default 9092 }}
      targetPort: 9092
---
# 兼容历史 broker:9092（与 values 默认 / 文档示例对齐）
apiVersion: v1
kind: Service
metadata:
  name: broker
  namespace: {{ $ns }}
  labels:
    app: {{ $name }}
spec:
  type: ClusterIP
  selector:
    app: {{ $name }}
  ports:
    - name: plaintext
      port: 9092
      targetPort: 9092
---
# 单节点 KRaft StatefulSet（与 docker-compose.migration.yml apache/kafka:3.8.0 对齐）
# 多副本需另行调整 quorum / advertised.listeners；演示默认 replicas=1
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    app: {{ $name }}
spec:
  serviceName: {{ $name }}-headless
  replicas: {{ $replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      containers:
        - name: kafka
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.kafka.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: plaintext
              containerPort: 9092
            - name: controller
              containerPort: 9093
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@{{ $name }}-0.{{ $name }}-headless.{{ $ns }}.svc.cluster.local:9093"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://{{ $name }}.{{ $ns }}.svc.cluster.local:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "{{ .Values.kafka.replicationFactor | default 1 }}"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "{{ .Values.kafka.replicationFactor | default 1 }}"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
            initialDelaySeconds: 25
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            {{- toYaml (.Values.kafka.statefulSet.resources | default dict) | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.kafka.statefulSet.storageClassName }}
        storageClassName: {{ .Values.kafka.statefulSet.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.kafka.statefulSet.storageSize | default "10Gi" | quote }}
{{- end }}
