# charts/couponkill/templates/deploy-user.yaml

# Deployment配置：定义用户服务的部署资源
# 用于创建和管理用户服务的Pod副本
# 参数说明：
#   .Values.services.user.name        - 服务名称
#   .Values.namespace                 - 命名空间
#   .Values.services.user.replicas    - 副本数量
#   .Values.image.registry            - 镜像仓库地址
#   .Values.services.user.image.name  - 镜像名称
#   .Values.services.user.image.tag   - 镜像标签
#   .Values.services.user.port        - 容器端口
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.services.user.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.services.user.name }}
    version: v1
spec:
  replicas: {{ .Values.services.user.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.services.user.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.services.user.name }}
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.services.user.port }}"
        prometheus.io/path: "/actuator/prometheus"
        # Nacos配置检查，用于实现零停机配置更新
        nacos-config-checksum: {{ .Values.nacos.config.sharding.user.content | default "" | sha256sum | quote }}
        nacos-common-checksum: {{ .Values.nacos.config.common.content | default "" | sha256sum | quote }}
        # 动态配置注解
        config-refresh-interval: {{ .Values.config.refreshInterval | default "30s" | quote }}
        config-checksum: {{ .Values.dynamic.config | toYaml | sha256sum | quote }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount2.name }}
      containers:
        - name: app
          image: "{{ .Values.image.registry }}:{{ .Values.services.user.image.name }}"
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.services.user.port }}
          # 就绪探针，检查服务是否可用
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.services.user.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          # 存活探针，检查服务是否正常运行
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.services.user.port }}
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "{{ .Values.services.user.resources.requests.memory | default "512Mi" }}"
              cpu: "{{ .Values.services.user.resources.requests.cpu | default "250m" }}"
            limits:
              memory: "{{ .Values.services.user.resources.limits.memory | default "2Gi" }}"
              cpu: "{{ .Values.services.user.resources.limits.cpu | default "1000m" }}"
          env:
            - name: SERVER_PORT
              value: "{{ .Values.services.user.port }}"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/user_db_0?sslmode=disable"
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "postgres"
            - name: SPRING_REDIS_HOST
              value: "redis"
            - name: SPRING_REDIS_PORT
              value: "6379"
            {{- if .Values.nacos.enabled }}
            - name: SPRING_CLOUD_NACOS_SERVER-ADDR
              value: "{{ .Values.nacos.name }}:{{ .Values.nacos.service.port }}"
            {{- end }}
            {{- if .Values.sentinel.enabled }}
            - name: SPRING_CLOUD_SENTINEL_TRANSPORT_DASHBOARD
              value: "{{ .Values.sentinel.name }}-dashboard:{{ .Values.sentinel.dashboard.service.port }}"
            {{- end }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            # JVM 单真源 JAVA_TOOL_OPTIONS（JDK25 ZGC + CompactHeaders）
            - name: JAVA_TOOL_OPTIONS
              value: {{ .Values.services.user.jvmOpts | default "-XX:+UseZGC -XX:+ZGenerational -XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=75.0" | quote }}
            # 线程池优化参数（VT 对齐；勿再注入巨大 Tomcat 平台线程）
            {{- if .Values.services.user.threadPoolOpts }}
            - name: THREAD_POOL_OPTS
              value: "{{ .Values.services.user.threadPoolOpts }}"
            {{- end }}
            # 动态配置相关环境变量
            - name: CONFIG_REFRESH_ENABLED
              value: {{ .Values.dynamic.config.enabled | default true | quote }}
            - name: CONFIG_REFRESH_INTERVAL
              value: {{ .Values.dynamic.config.refreshInterval | default "30s" | quote }}
            - name: CONFIG_SOURCE_TYPE
              value: {{ .Values.dynamic.config.sourceType | default "nacos" | quote }}
            - name: CONFIG_SOURCE_URL
              value: {{ .Values.dynamic.config.sourceUrl | default "" | quote }}
            - name: FEATURE_TOGGLE
              value: {{ .Values.dynamic.featureToggles | default dict | toJson | quote }}
---
# Service配置：为用户服务提供稳定的网络访问入口
# 参数说明：
#   .Values.services.user.name        - 服务名称
#   .Values.namespace                 - 命名空间
#   .Values.services.user.port        - 目标端口
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.user.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.services.user.name }}
spec:
  selector:
    app: {{ .Values.services.user.name }}
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.services.user.port }}
  type: ClusterIP

---
# HorizontalPodAutoscaler配置（可选）：根据CPU使用率自动调整Pod副本数
# 条件启用：仅当 .Values.services.user.hpa.enabled 为 true 时生效
# 参数说明：
#   .Values.services.user.name              - 被扩缩容的目标Deployment名称
#   .Values.namespace                       - 命名空间
#   .Values.services.user.hpa.minReplicas   - 最小副本数
#   .Values.services.user.hpa.maxReplicas   - 最大副本数
#   .Values.services.user.hpa.cpu           - 触发扩缩容的CPU平均利用率阈值
{{- if .Values.services.user.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.services.user.name }}
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.services.user.name }}
  minReplicas: {{ .Values.services.user.hpa.minReplicas }}
  maxReplicas: {{ .Values.services.user.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.services.user.hpa.cpu }}
{{- end }}