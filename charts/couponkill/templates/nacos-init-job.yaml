        - sms
        - webhook
      recipients:
        - admin@couponkill.com
        - ops@couponkill.com
    logging:
      enabled: true
      level: INFO
      retention-days: 30
    protection:
      enabled: true
      cooldown-period: 300
      max-switches-per-hour: 10
      rollback-on-failure: true
    testing:
      enabled: false
      canary-percentage: 10
      test-duration: 300
    time-windows:
      enabled: false
      windows:
        - start: 02:00
          end: 04:00
          days: [1, 3, 5]
    approval:
      enabled: false
      approvers:
        - admin@couponkill.com
        - ops-lead@couponkill.com
    rollback:
      enabled: true
      auto-rollback-after: 600
      rollback-threshold: 50" \
                -H "Content-Type: application/x-www-form-urlencoded;charset=utf-8"
              
              echo "Default Nacos configurations initialized successfully."
              {{- end }}
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
      restartPolicy: OnFailure
      serviceAccountName: {{ .Values.serviceAccount4.name }}
{{- end }}