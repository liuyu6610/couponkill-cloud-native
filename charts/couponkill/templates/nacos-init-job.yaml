        seckill-order-result: seckill_order_result
        seckill-compensation: seckill_compensation
        dlq-suffix: .DLT
      failover:
        enabled: true
        retry-count: 3
        retry-interval: 1000
        timeout: 5000
      monitoring:
        enabled: true
        slow-operation-threshold: 1000
        log-slow-operations: true" \
                -H "Content-Type: application/x-www-form-urlencoded;charset=utf-8"
              
