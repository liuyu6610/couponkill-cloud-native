                -d "group=DEFAULT_GROUP" \
                --data-urlencode "content=cluster:
  switch:
    auto-switch-enabled: false
    strategy: MANUAL
    thresholds:
      cpu-usage: 80
      memory-usage: 85
      response-time: 1000
      error-rate: 5
      throughput-drop: 30
    conditions:
      consecutive-failures: 3
      failure-window: 60
      recovery-window: 300
    operations:
      scale-up:
        enabled: true
        threshold: 70
        max-replicas: 10
        scale-factor: 1.5
      scale-down:
        enabled: true
        threshold: 30
