{{- if .Values.nacos.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: nacos-init
  namespace: {{ .Values.namespace }}
  labels:
    app: nacos-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    metadata:
      labels:
        app: nacos-init
    spec:
      containers:
        - name: nacos-client
          image: "{{ .Values.nacos.configWatcher.image.repository }}:{{ .Values.nacos.configWatcher.image.tag }}"
          imagePullPolicy: {{ .Values.nacos.configWatcher.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              # 等待 Nacos 服务启动
              until curl -s "http://{{ .Values.nacos.name }}:{{ .Values.nacos.service.port }}/nacos/v1/console/health/liveness" | grep -q "UP"; do
                echo "Waiting for Nacos to be ready..."
                sleep 5
              done
              
              echo "Nacos is ready. Initializing configurations..."
              
              {{- if .Values.nacos.config.external.enabled }}
              # 从外部源加载配置
              echo "Loading configurations from external source: {{ .Values.nacos.config.external.url }}"
              curl -s -L -o /tmp/nacos-configs.zip {{ .Values.nacos.config.external.url }}
              cd /tmp
              unzip nacos-configs.zip
              
              # 遍历配置文件并导入到Nacos
              for file in *.yaml *.yml *.json; do
                if [ -f "$file" ]; then
                  echo "Importing configuration file: $file"
                  filename=$(basename "$file")
                  extension="${filename##*.}"
                  dataId="${filename}"
                  group="DEFAULT_GROUP"
                  
                  # 根据文件扩展名设置content-type
                  if [ "$extension" = "yaml" ] || [ "$extension" = "yml" ]; then
                    contentType="application/yaml"
                  elif [ "$extension" = "json" ]; then
                    contentType="application/json"
                  else
                    contentType="text/plain"
                  fi
                  
                  # 导入配置到Nacos
                  curl -X POST "http://{{ .Values.nacos.name }}:{{ .Values.nacos.service.port }}/nacos/v1/cs/configs" \
                    -H "Content-Type: application/x-www-form-urlencoded;charset=utf-8" \
                    --data-urlencode "dataId=$dataId" \
                    --data-urlencode "group=$group" \
                    --data-urlencode "content@./$file" \
                    -H "contentType: $contentType"
                fi
              done
              
              echo "Nacos configurations imported successfully from external source."
              {{- else }}
              # 使用默认配置初始化
              echo "Initializing with default configurations..."
              
              # 创建默认的common.yaml配置
              curl -X POST "http://{{ .Values.nacos.name }}:{{ .Values.nacos.service.port }}/nacos/v1/cs/configs" \
                -d "dataId=common.yaml" \
                -d "group=DEFAULT_GROUP" \
                --data-urlencode "content=spring:
  data:
    redis:
      host: redis-master
      port: 6379
      lettuce:
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 20
          max-wait: 2000ms
  cloud:
    sentinel:
      transport:
        dashboard: sentinel-dashboard:8080
        port: 8719
      eager: true
      datasource:
        ds1:
          nacos:
            server-addr: \${spring.cloud.nacos.server-addr}
            namespace: \${spring.cloud.nacos.namespace}
            data-id: couponkill-gateway-sentinel
            data-type: json
            group: SENTINEL_GROUP
            rule-type: flow
kafka:
  topic:
    seckill-order-create: seckill_order_create
    seckill-order-result: seckill_order_result
    seckill-compensation: seckill_compensation
thread-pool:
  async:
    core-pool-size: 50
    max-pool-size: 100
    queue-capacity: 500
    keep-alive-seconds: 60
    rejected-policy: CALLER_RUNS
  order:
    core-pool-size: 50
    max-pool-size: 100
    queue-capacity: 1000
    thread-name-prefix: order-async-
    keep-alive-seconds: 60
    rejected-policy: CALLER_RUNS
database:
  postgresql:
    master:
      host: postgres-master
      port: 5432
      username: postgres
      password: postgres
    slaves:
      - host: postgres-slave-0
        port: 5432
        username: postgres
        password: postgres
      - host: postgres-slave-1
        port: 5432
        username: postgres
        password: postgres
cluster:
  config:
    middleware: middleware-cluster.yaml
    database: database-connection.yaml
    cache: cache-connection.yaml
    messaging: messaging-connection.yaml
    postgresql: postgresql-cluster.yaml
    redis: redis-cluster.yaml" \
                -H "Content-Type: application/x-www-form-urlencoded;charset=utf-8"
              
              # 创建默认的网关配置
              curl -X POST "http://{{ .Values.nacos.name }}:{{ .Values.nacos.service.port }}/nacos/v1/cs/configs" \
                -d "dataId=gateway.yaml" \
                -d "group=DEFAULT_GROUP" \
                --data-urlencode "content=spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://couponkill-user-service
              predicates:
                - Path=/api/v1/user/**
            - id: coupon-service
              uri: lb://couponkill-coupon-service
              predicates:
                - Path=/api/v1/coupon/**
            - id: order-service
              uri: lb://couponkill-order-service
              predicates:
                - Path=/api/v1/order/**,/order/**
            # Go 热路径已冻结，默认不注册网关路由
            # - id: seckill-go-service
            #   uri: lb://seckill-go-svc
            #   predicates:
            #     - Path=/seckill/go/**
            " \
                -H "Content-Type: application/x-www-form-urlencoded;charset=utf-8"
              
              # 创建 PostgreSQL 集群配置（对齐 nacos/DEFAULT_GROUP/postgresql-cluster.yaml）
              curl -X POST "http://{{ .Values.nacos.name }}:{{ .Values.nacos.service.port }}/nacos/v1/cs/configs" \
                -d "dataId=postgresql-cluster.yaml" \
                -d "group=DEFAULT_GROUP" \
                --data-urlencode "content=postgresql:
  cluster:
    enabled: false
    master-slave:
      enabled: false
      master:
        host: postgres-master
        port: 5432
        username: postgres
        password: postgres
      slaves:
        - host: postgres-slave-0
          port: 5432
          username: postgres
          password: postgres
        - host: postgres-slave-1
          port: 5432
          username: postgres
          password: postgres
    patroni-cluster:
      enabled: false
      nodes:
        - host: postgres-node-0
          port: 5432
          username: postgres
          password: postgres
        - host: postgres-node-1
          port: 5432
          username: postgres
          password: postgres
        - host: postgres-node-2
          port: 5432
          username: postgres
          password: postgres
    read-write-splitting:
      enabled: false
      strategy: ROUND_ROBIN
      master:
        host: postgres-master
        port: 5432
        username: postgres
        password: postgres
      slaves:
        - host: postgres-slave-0
          port: 5432
          username: postgres
          password: postgres
        - host: postgres-slave-1
          port: 5432
          username: postgres
          password: postgres
    pool:
      max-active: 100
      max-idle: 20
      min-idle: 5
      initial-size: 10
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
    failover:
      enabled: true
      retry-count: 3
      retry-interval: 1000
      timeout: 5000" \
                -H "Content-Type: application/x-www-form-urlencoded;charset=utf-8"
              
              # 创建Redis集群配置
              curl -X POST "http://{{ .Values.nacos.name }}:{{ .Values.nacos.service.port }}/nacos/v1/cs/configs" \
                -d "dataId=redis-cluster.yaml" \
                -d "group=DEFAULT_GROUP" \
                --data-urlencode "content=redis:
  cluster:
    enabled: false
    standalone:
      enabled: true
      host: redis-master
      port: 6379
      password: ''
      database: 0
    master-slave:
      enabled: false
      master:
        host: redis-master
        port: 6379
        password: ''
      slaves:
        - host: redis-slave-0
          port: 6379
          password: ''
        - host: redis-slave-1
          port: 6379
          password: ''
    sentinel:
      enabled: false
      master-name: mymaster
      sentinels:
        - host: redis-sentinel-0
          port: 26379
        - host: redis-sentinel-1
          port: 26379
        - host: redis-sentinel-2
          port: 26379
      password: ''
      database: 0
    redis-cluster:
      enabled: false
      nodes:
        - host: redis-node-0
          port: 6379
        - host: redis-node-1
          port: 6379
        - host: redis-node-2
          port: 6379
        - host: redis-node-3
          port: 6379
        - host: redis-node-4
          port: 6379
        - host: redis-node-5
          port: 6379
      password: ''
      max-redirects: 3
    pool:
      max-active: 200
      max-idle: 50
      min-idle: 10
      max-wait: 2000
      time-between-eviction-runs: 30000
      min-evictable-idle-time: 60000
      test-while-idle: true
      test-on-create: false
      test-on-borrow: false
      test-on-return: false
    serialization:
      key-serializer: org.springframework.data.redis.serializer.StringRedisSerializer
      value-serializer: org.springframework.data.redis.serializer.GenericJackson2JsonRedisSerializer
    failover:
      enabled: true
      retry-count: 3
      retry-interval: 1000
      timeout: 2000" \
                -H "Content-Type: application/x-www-form-urlencoded;charset=utf-8"
              
              # 创建中间件集群配置
              curl -X POST "http://{{ .Values.nacos.name }}:{{ .Values.nacos.service.port }}/nacos/v1/cs/configs" \
                -d "dataId=middleware-cluster.yaml" \
                -d "group=DEFAULT_GROUP" \
                --data-urlencode "content=middleware:
  cluster:
    enabled: false
    mode: auto
  database:
    postgresql:
      type: standalone
      standalone:
        host: postgres
        port: 5432
        username: postgres
        password: postgres
      master-slave:
        master:
          host: postgres-master
          port: 5432
          username: postgres
          password: postgres
        slaves:
          - host: postgres-slave-0
            port: 5432
            username: postgres
            password: postgres
          - host: postgres-slave-1
            port: 5432
            username: postgres
            password: postgres
      patroni-cluster:
        nodes:
          - host: postgres-node-0
            port: 5432
            username: postgres
            password: postgres
          - host: postgres-node-1
            port: 5432
            username: postgres
            password: postgres
          - host: postgres-node-2
            port: 5432
            username: postgres
            password: postgres
  cache:
    redis:
      type: standalone
      standalone:
        host: redis-master
        port: 6379
        password: ''
        database: 0
      master-slave:
        master:
          host: redis-master
          port: 6379
          password: ''
        slaves:
          - host: redis-slave-0
            port: 6379
            password: ''
          - host: redis-slave-1
            port: 6379
            password: ''
      sentinel:
        master-name: mymaster
        sentinels:
          - host: redis-sentinel-0
            port: 26379
          - host: redis-sentinel-1
            port: 26379
          - host: redis-sentinel-2
            port: 26379
        password: ''
        database: 0
      cluster:
        nodes:
          - host: redis-node-0
            port: 6379
          - host: redis-node-1
            port: 6379
          - host: redis-node-2
            port: 6379
          - host: redis-node-3
            port: 6379
          - host: redis-node-4
            port: 6379
          - host: redis-node-5
            port: 6379
        password: ''
        max-redirects: 3
  messaging:
    kafka:
      type: standalone
      standalone:
        bootstrap-servers: kafka:9092
      cluster:
        bootstrap-servers:
          - kafka-0:9092
          - kafka-1:9092
          - kafka-2:9092
  config:
    nacos:
      type: standalone
      standalone:
        server-addr: nacos:8848
      cluster:
        server-addrs:
          - nacos-0:8848
          - nacos-1:8848
          - nacos-2:8848
        namespace: couponkill
  registry:
    nacos:
      type: standalone
      standalone:
        server-addr: nacos:8848
      cluster:
        server-addrs:
          - nacos-0:8848
          - nacos-1:8848
          - nacos-2:8848
        namespace: couponkill
  loadbalancer:
    strategy: ROUND_ROBIN
    retry:
      enabled: true
      max-attempts: 3
      backoff:
        enabled: true
        multiplier: 2.0
        max-interval: 10000
  failover:
    enabled: true
    timeout: 5000
    retry-count: 3
    retry-interval: 1000" \
                -H "Content-Type: application/x-www-form-urlencoded;charset=utf-8"
              
              # 创建数据库连接配置
              curl -X POST "http://{{ .Values.nacos.name }}:{{ .Values.nacos.service.port }}/nacos/v1/cs/configs" \
                -d "dataId=database-connection.yaml" \
                -d "group=DEFAULT_GROUP" \
                --data-urlencode "content=database:
  connection:
    pool:
      max-active: 100
      max-idle: 20
      min-idle: 5
      initial-size: 10
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      remove-abandoned: true
      remove-abandoned-timeout: 1800
      log-abandoned: true
    transaction:
      isolation-level: READ_COMMITTED
      timeout: 30
      rollback-on-commit-failure: true
    sql:
      show-sql: false
      format-sql: false
      use-sql-comments: false
    connection:
      auto-commit: true
      catalog: console
      schema: 
      network-timeout: 30000
      holdability: HOLD_CURSORS_OVER_COMMIT
    driver:
      class-name: org.postgresql.Driver
      url-params: reWriteBatchedInserts=true&ApplicationName=couponkill&sslmode=disable
    ssl:
      enabled: false
      keystore:
      keystore-password:
      truststore:
      truststore-password:
    failover:
      enabled: true
      retry-count: 3
      retry-interval: 1000
      timeout: 5000
    monitoring:
      enabled: true
      slow-sql-threshold: 1000
      log-slow-sql: true
      log-all-sql: false" \
                -H "Content-Type: application/x-www-form-urlencoded;charset=utf-8"
              
              # 创建缓存连接配置
              curl -X POST "http://{{ .Values.nacos.name }}:{{ .Values.nacos.service.port }}/nacos/v1/cs/configs" \
                -d "dataId=cache-connection.yaml" \
                -d "group=DEFAULT_GROUP" \
                --data-urlencode "content=cache:
  connection:
    connection:
      timeout: 2000
      connect-timeout: 2000
      so-keep-alive: true
      so-tcp-no-delay: true
    pool:
      max-active: 200
      max-idle: 50
      min-idle: 10
      max-wait: 2000
      time-between-eviction-runs: 30000
      min-evictable-idle-time: 60000
      test-while-idle: true
      test-on-create: false
      test-on-borrow: false
      test-on-return: false
    serialization:
      key-serializer: org.springframework.data.redis.serializer.StringRedisSerializer
      value-serializer: org.springframework.data.redis.serializer.GenericJackson2JsonRedisSerializer
      hash-key-serializer: org.springframework.data.redis.serializer.StringRedisSerializer
      hash-value-serializer: org.springframework.data.redis.serializer.GenericJackson2JsonRedisSerializer
    command:
      default-expire-time: 3600
      use-key-prefix: true
      key-prefix: couponkill:
      cache-null-values: false
    transaction:
      enabled: false
      timeout: 5000
    pubsub:
      enabled: true
      message-listener-container:
        task-executor: pubsubTaskExecutor
        subscription-executor: pubsubSubscriptionExecutor
        max-concurrency: 10
        concurrency: 5
    failover:
      enabled: true
      retry-count: 3
      retry-interval: 1000
      timeout: 2000
    monitoring:
      enabled: true
      slow-operation-threshold: 1000
      log-slow-operations: true" \
                -H "Content-Type: application/x-www-form-urlencoded;charset=utf-8"
              
              # 创建消息队列连接配置（Kafka，对齐 nacos/DEFAULT_GROUP/messaging-connection.yaml）
