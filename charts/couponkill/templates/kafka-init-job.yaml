{{- if .Values.kafka.init.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.kafka.init.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.kafka.init.name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    metadata:
      labels:
        app: {{ .Values.kafka.init.name }}
    spec:
      containers:
        - name: kafka-client
          image: "{{ .Values.kafka.init.image.repository }}:{{ .Values.kafka.init.image.tag }}"
          imagePullPolicy: {{ .Values.kafka.init.image.pullPolicy }}
          env:
            - name: KAFKA_BROKER
              value: "{{ .Values.kafka.broker | default .Values.kafka.bootstrapServers }}"
            - name: KAFKA_TOPICS
              value: "{{ if kindIs "slice" .Values.kafka.topics }}{{ join "," .Values.kafka.topics }}{{ else }}{{ .Values.kafka.topics }}{{ end }}"
            - name: KAFKA_PARTITIONS
              value: "{{ .Values.kafka.partitions | default 16 }}"
            - name: KAFKA_REPLICATION_FACTOR
              value: "{{ .Values.kafka.replicationFactor | default 1 }}"
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Kafka to be ready..."
              until kafka-topics --bootstrap-server $KAFKA_BROKER --list; do
                sleep 2
              done

              echo "Creating Kafka topics (partitions=$KAFKA_PARTITIONS)..."
              IFS=',' read -ra TOPICS <<< "$KAFKA_TOPICS"
              for topic in "${TOPICS[@]}"; do
                topic=$(echo "$topic" | tr -d '[:space:]')
                [ -z "$topic" ] && continue
                kafka-topics --bootstrap-server $KAFKA_BROKER --create --if-not-exists \
                  --topic "$topic" --partitions $KAFKA_PARTITIONS --replication-factor $KAFKA_REPLICATION_FACTOR
              done

              echo "Kafka initialization completed."
      restartPolicy: OnFailure
{{- end }}
