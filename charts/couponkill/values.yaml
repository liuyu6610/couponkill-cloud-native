# couponkill 项目配置文件
# 定义了微服务架构中各个服务的配置信息，包括镜像、服务部署参数、自动扩缩容配置以及服务网格配置

namespace: couponkill  # Kubernetes 命名空间名称
namespaceMonitor: monitor

# CRD安装选项
crd:
  install: true

# 示例资源选项
examples:
  seckill: false

# 依赖服务配置
dependencies:
  enabled: true

# 数据库配置 - PostgreSQL，支持流复制/集群模式
db:
  # 单节点模式配置
  host: postgres
  port: 5432
  username: postgres
  password: postgres
  database: postgres
  # 初始化配置
  init:
    enabled: false
    name: db-init
    image:
      repository: postgres
      tag: "16"
      pullPolicy: IfNotPresent
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "200m"
  # 集群模式配置 (适用于MySQL Group Replication或类似集群方案)
  cluster:
    enabled: false
    # 节点列表格式: host:port
    # 示例: 
    # nodes:
    #   - "mysql-node1:3306"
    #   - "mysql-node2:3306"
    #   - "mysql-node3:3306"
    nodes: []

# 镜像配置部分，定义了服务使用的镜像仓库地址和标签
image:
  # 镜像仓库地址
  registry: crpi-n5rumpjwbqinoz4c.cn-hangzhou.personal.cr.aliyuncs.com/thetestspacefordocker/my-docker
  # 镜像标签
  tag: latest

# 各个微服务配置
services:
  # Go 秒杀服务配置
  go:
    name: seckill-go
    port: 8083
    replicas: 1
    image:
      name: "seckill-go"
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 10
      targetCPUUtilizationPercentage: 80
  # 用户服务配置
  user:
    name: couponkill-user-service
    port: 8081
    replicas: 1
    image:
      name: "user"
    jvmOpts: "-XX:+UseZGC -XX:+ZGenerational -XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=75.0"
    threadPoolOpts: "-Dspring.threads.virtual.enabled=true"
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 10
      targetCPUUtilizationPercentage: 80
  # 优惠券服务配置
  coupon:
    name: couponkill-coupon-service
    port: 8080
    replicas: 1
    image:
      name: "coupon"
    jvmOpts: "-XX:+UseZGC -XX:+ZGenerational -XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=75.0"
    threadPoolOpts: "-Dspring.threads.virtual.enabled=true"
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "2000m"
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 10
      targetCPUUtilizationPercentage: 80
  # 订单服务配置
  order:
    name: couponkill-order-service
    port: 8082
    replicas: 1
    image:
      name: "order"
    jvmOpts: "-XX:+UseZGC -XX:+ZGenerational -XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=75.0 --enable-preview"
    threadPoolOpts: "-Dspring.threads.virtual.enabled=true"
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "2000m"
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 10
      targetCPUUtilizationPercentage: 80
  # Connector（电商库存同步；不进秒杀热路径）
  connector:
    enabled: true
    name: couponkill-connector-service
    port: 8085
    replicas: 1
    image:
      name: "connector"
    profile: prod
    jvmOpts: "-XX:+UseZGC -XX:+ZGenerational -XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=75.0"
    threadPoolOpts: "-Dspring.threads.virtual.enabled=true"
    internalTokenStrict: true
    internalTokenSecret:
      name: connector-secrets
      key: internal-token
      optional: true
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"
  # 网关服务配置
  gateway:
    name: couponkill-gateway
    port: 8080
    jvmOpts: "-XX:+UseZGC -XX:+ZGenerational -XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=75.0"
    threadPoolOpts: "-Dspring.threads.virtual.enabled=true"
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
    replicas: 1
    image:
      name: "gateway"
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 10
      targetCPUUtilizationPercentage: 80
  # Operator配置
  operator:
    name: couponkill-operator
    port: 8084
    replicas: 1
    image:
      name: "operator"
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 10
      targetCPUUtilizationPercentage: 80

# RocketMQ配置（已迁移至 Kafka，默认关闭；保留结构以便回滚对比）
rocketmq:
  enabled: false
  name: rocketmq
  namesrv:
    replicas: 1
    port: 9876
    image:
      repository: crpi-n5rumpjwbqinoz4c.cn-hangzhou.personal.cr.aliyuncs.com/thetestspacefordocker/my-docker
      tag: rocketmq-namesrv
      pullPolicy: IfNotPresent
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"
    service:
      port: 9876
  broker:
    replicas: 1
    image:
      repository: crpi-n5rumpjwbqinoz4c.cn-hangzhou.personal.cr.aliyuncs.com/thetestspacefordocker/my-docker
      tag: rocketmq-broker
      pullPolicy: IfNotPresent
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1"
    service:
      ports:
        listenPort: 10911
        haListenPort: 10912

# Redis配置
redis:
  enabled: true
  name: redis
  master:
    replicas: 1
    port: 6379
    image:
      repository: redis
      tag: latest
      pullPolicy: IfNotPresent
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "200m"

# Kafka 配置（消息中间件，替代 RocketMQ）
kafka:
  enabled: true
  name: broker
  port: 9092
  broker: broker:9092
  # 单节点 KRaft；生产多副本 broker 需提供 StatefulSet 或外部托管 Kafka
  bootstrapServers: broker:9092
  # 主题真源：与 docker-compose.migration.yml / kafka-init-job 对齐 16 分区
  topics:
    - seckill_order_create
    - seckill_order_result
    - seckill_compensation
  partitions: 16
  replicationFactor: 1
  cluster:
    enabled: false
  init:
    enabled: true
    name: kafka-init
    image:
      repository: apache/kafka
      tag: "3.8.0"
      pullPolicy: IfNotPresent

# PostgreSQL配置（数据库，替代 MySQL；key 保留为 mysql 以兼容既有模板引用，值已切换为 PG）
mysql:
  enabled: false
  name: postgres
  port: 5432
  rootPassword: postgres
  database: postgres
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  # MySQL集群配置
  cluster:
    # 是否启用集群模式
    enabled: false
    # 集群类型: standalone, master-slave, group-replication, innodb-cluster
    type: standalone
    # 主从复制配置
    masterSlave:
      enabled: false
      master:
        host: mysql-master
        port: 3306
      slaves:
        - host: mysql-slave-0
          port: 3306
        - host: mysql-slave-1
          port: 3306
    # Group Replication配置
    groupReplication:
      enabled: false
      nodes:
        - host: mysql-gr-0
          port: 3306
        - host: mysql-gr-1
          port: 3306
        - host: mysql-gr-2
          port: 3306
    # InnoDB Cluster配置
    innodbCluster:
      enabled: false
      nodes:
        - host: mysql-innodb-0
          port: 3306
        - host: mysql-innodb-1
          port: 3306
        - host: mysql-innodb-2
          port: 3306

# Nacos配置
nacos:
  enabled: true
  name: nacos
  image:
    # 官方镜像与 nacos-client 3.1.1 对齐；若用私有 ACR 请自行同步 tag v3.1.1
    repository: nacos/nacos-server
    tag: v3.1.1
    pullPolicy: IfNotPresent
  replicas: 1
  cluster:
    enabled: false
    replicas: 3
    config:
      serverAddr: ""
  service:
    port: 8848
    external:
      enabled: false
  config:
    # Nacos配置加载方式
    # external 表示从外部源加载配置
    external:
      enabled: true
      # 外部配置源地址
      url: "https://raw.githubusercontent.com/your-org/couponkill-configs/main/nacos-configs.zip"
    # 初始化配置
    init:
      enabled: true
      # 初始化脚本
      script: |
        #!/bin/sh
        echo "Initializing Nacos configurations from external source..."
  configWatcher:
    enabled: true
    name: nacos-config-watcher
    schedule: "*/5 * * * *"
    image:
      repository: curlimages/curl
      tag: latest
      pullPolicy: IfNotPresent
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
  storage:
    # 本地/开发用内置 Derby，避免外部元数据库依赖。
    # 生产若要用 PostgreSQL 作为 Nacos 元数据库，需引入社区插件
    # nacos-datasource-plugin-ext / nacos-postgresql-datasource-plugin（Nacos 原生仅支持 MySQL+Derby），
    # 并将 type 改为 postgresql、填写下方连接信息。
    type: embedded
    postgresql:
      host: postgres
      port: 5432
      user: postgres
      password: postgres
      database: nacos
      
# Sentinel配置
sentinel:
  enabled: false
  name: sentinel
  dashboard:
    replicas: 1
    service:
      port: 8080
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"

# 服务账户配置
serviceAccount0:
  name: seckill-go
serviceAccount1:
  name: couponkill-coupon-service
serviceAccount2:
  name: couponkill-order-service
serviceAccount3:
  name: couponkill-user-service
serviceAccount4:
  name: couponkill-gateway-service

# KEDA配置
keda:
  enabled: false
  kafka:
    bootstrapServers: "kafka:9092"
    goEdge:
      enabled: false
      deploymentName: "seckill-go-svc"
      minReplicaCount: 1
      maxReplicaCount: 5
      consumerGroup: "seckill-go-group"
      topic: "seckill_order_create"
      lagThreshold: "5"
    order:
      enabled: false
      deploymentName: "couponkill-order-service"
      minReplicaCount: 1
      maxReplicaCount: 5
      consumerGroup: "order-create"
      topic: "seckill_order_create"
      lagThreshold: "5"

# 监控配置
monitoring:
  enabled: false
  prometheus:
    enabled: false

# Istio配置
istio:
  enabled: false
  gateway:
    name: couponkill-gateway
    host: couponkill.example.com
    port: 80