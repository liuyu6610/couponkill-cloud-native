spring:
  application:
    name: couponkill-order-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - optional:nacos:common.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:120}
        heart-beat-timeout: 30000
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        file-extension: yaml
        group: DEFAULT_GROUP
        namespace: ${NACOS_NAMESPACE:120}
        refresh-enabled: true
shardingsphere:
  namespace: 998
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.aliyun.seckill.common.pojo

# P0 预约帮抢（可被 Nacos couponkill-order-service.yaml 覆盖）
couponkill:
  reservation:
    enabled: true
    scan-interval-ms: 1000
    expire-interval-ms: 60000
    max-retry: 3
    batch-size: 50

management:
  endpoints:
    web:
      exposure:
        include: refresh,health,info
